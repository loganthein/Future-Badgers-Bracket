name: Update Bracket Results

on:
  schedule:
    - cron: '0,20,40 17-23 * * *'
    - cron: '0,20,40 0-5 * * *'
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch ESPN scores and update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_PAT }}
          GIST_ID: 798906720fa8cb351ffb485d9631a07f
        run: |
          node << 'EOF'
          const https = require('https');

          const ROUND_KEYS = ['round1', 'round2', 'sweet16', 'elite8', 'finalfour', 'championship'];

          const NICKNAME_MAP = {
            'Duke Blue Devils': 'Duke',
            'UConn Huskies': 'UConn',
            'Michigan State Spartans': 'Michigan State',
            'Kansas Jayhawks': 'Kansas',
            "St. John's Red Storm": "St. John's",
            'Louisville Cardinals': 'Louisville',
            'UCLA Bruins': 'UCLA',
            'Ohio State Buckeyes': 'Ohio State',
            'TCU Horned Frogs': 'TCU',
            'UCF Knights': 'UCF',
            'South Florida Bulls': 'South Florida',
            'Northern Iowa Panthers': 'Northern Iowa',
            'Cal Baptist Lancers': 'Cal Baptist',
            'North Dakota State Bison': 'North Dakota State',
            'Furman Paladins': 'Furman',
            'Siena Saints': 'Siena',
            'Arizona Wildcats': 'Arizona',
            'Purdue Boilermakers': 'Purdue',
            'Gonzaga Bulldogs': 'Gonzaga',
            'Arkansas Razorbacks': 'Arkansas',
            'Wisconsin Badgers': 'Wisconsin',
            'BYU Cougars': 'BYU',
            'Miami Hurricanes': 'Miami (FL)',
            'Villanova Wildcats': 'Villanova',
            'Utah State Aggies': 'Utah State',
            'Missouri Tigers': 'Missouri',
            'NC State Wolfpack': 'Texas/NC State',
            'Texas Longhorns': 'Texas/NC State',
            'High Point Panthers': 'High Point',
            'Hawaii Rainbow Warriors': 'Hawaii',
            'Kennesaw State Owls': 'Kennesaw State',
            'Queens Royals': 'Queens',
            'LIU Sharks': 'LIU',
            'Florida Gators': 'Florida',
            'Houston Cougars': 'Houston',
            'Illinois Fighting Illini': 'Illinois',
            'Nebraska Cornhuskers': 'Nebraska',
            'Vanderbilt Commodores': 'Vanderbilt',
            'North Carolina Tar Heels': 'North Carolina',
            "Saint Mary's Gaels": "Saint Mary's",
            'Clemson Tigers': 'Clemson',
            'Iowa Hawkeyes': 'Iowa',
            'Texas A&M Aggies': 'Texas A&M',
            'VCU Rams': 'VCU',
            'McNeese Cowboys': 'McNeese',
            'Troy Trojans': 'Troy',
            'Penn Quakers': 'Penn',
            'Idaho Vandals': 'Idaho',
            'Prairie View Panthers': 'Pra. View/Lehigh',
            'Lehigh Mountain Hawks': 'Pra. View/Lehigh',
            'Michigan Wolverines': 'Michigan',
            'Iowa State Cyclones': 'Iowa State',
            'Virginia Cavaliers': 'Virginia',
            'Alabama Crimson Tide': 'Alabama',
            'Texas Tech Red Raiders': 'Texas Tech',
            'Tennessee Volunteers': 'Tennessee',
            'Kentucky Wildcats': 'Kentucky',
            'Georgia Bulldogs': 'Georgia',
            'Saint Louis Billikens': 'Saint Louis',
            'Santa Clara Broncos': 'Santa Clara',
            'Miami RedHawks': 'Miami (OH)/SMU',
            'SMU Mustangs': 'Miami (OH)/SMU',
            'Akron Zips': 'Akron',
            'Hofstra Pride': 'Hofstra',
            'Wright State Raiders': 'Wright State',
            'Tennessee State Tigers': 'Tennessee State',
            'UMBC Retrievers': 'UMBC/Howard',
            'Howard Bison': 'UMBC/Howard',
          };

          function normalizeName(name) {
            return NICKNAME_MAP[name] || name;
          }

          function fetch(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function fetchGist(gistId, token) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.github.com',
                path: `/gists/${gistId}`,
                headers: {
                  'Authorization': `token ${token}`,
                  'User-Agent': 'bracket-updater',
                  'Accept': 'application/vnd.github.v3+json'
                }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function updateGist(gistId, token, content) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                files: { 'bracket-data.json': { content: JSON.stringify(content, null, 2) } }
              });
              const options = {
                hostname: 'api.github.com',
                path: `/gists/${gistId}`,
                method: 'PATCH',
                headers: {
                  'Authorization': `token ${token}`,
                  'User-Agent': 'bracket-updater',
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function buildGameId(region, roundIndex, gameNum) {
            const prefix = { 'East': 'E', 'West': 'W', 'South': 'S', 'Midwest': 'M' }[region];
            if (!prefix) return null;
            const offsets = [0, 8, 12, 14];
            return `${prefix}${offsets[roundIndex] + gameNum}`;
          }

          function getRoundIndex(event) {
            const notes = (event.competitions?.[0]?.notes || []).map(n => n.headline || '').join(' ');
            const slug = event.season?.slug || '';
            const combined = (slug + ' ' + notes).toLowerCase();

            console.log(`  ESPN notes: "${notes}" | slug: "${slug}"`);

            // Check specific rounds BEFORE championship (notes always contain "Championship")
            if (combined.includes('1st round') || combined.includes('first round') || combined.includes('round of 64')) return 0;
            if (combined.includes('2nd round') || combined.includes('second round') || combined.includes('round of 32')) return 1;
            if (combined.includes('sweet 16') || combined.includes('sweet sixteen')) return 2;
            if (combined.includes('elite eight') || combined.includes('elite 8')) return 3;
            if (combined.includes('final four') || combined.includes('semifinal')) return 4;
            if (combined.includes('national championship') || combined.includes('championship game')) return 5;

            // Fallback: ESPN tournament round ID
            const roundId = event.competitions?.[0]?.tournament?.round?.id;
            console.log(`  Tournament roundId: ${roundId}`);
            if (roundId) {
              const roundMap = { 1: 0, 2: 1, 3: 2, 4: 3, 5: 4, 6: 5 };
              if (roundMap[roundId] !== undefined) return roundMap[roundId];
            }

            return -1;
          }

          function getRegion(event) {
            const notes = (event.competitions?.[0]?.notes || []).map(n => n.headline || '').join(' ');
            const match = notes.match(/\b(East|West|South|Midwest)\b/i);
            const regionField = event.competitions?.[0]?.tournament?.region?.name || '';
            const region = match ? match[1] : (regionField || null);
            console.log(`  Region: ${region}`);
            return region;
          }

          async function main() {
            const token = process.env.GIST_TOKEN;
            const gistId = process.env.GIST_ID;

            const gistData = await fetchGist(gistId, token);
            const bracketData = JSON.parse(gistData.files['bracket-data.json'].content);

            const newResults = {
              round1: [], round2: [], sweet16: [],
              elite8: [], finalfour: [], championship: []
            };

            const espn = await fetch(
              'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&limit=100'
            );

            const events = espn.events || [];
            console.log(`Found ${events.length} ESPN events`);

            const regionRoundCount = {};

            for (const event of events) {
              const status = event.status?.type?.name;
              if (status !== 'STATUS_FINAL') continue;

              const competition = event.competitions?.[0];
              if (!competition) continue;

              const competitors = competition.competitors || [];
              const winner = competitors.find(c => c.winner);
              if (!winner) continue;

              const rawName = winner.team?.displayName || winner.team?.name || '';
              const winnerName = normalizeName(rawName);
              console.log(`\nGame winner: ${rawName} → ${winnerName}`);

              const roundIndex = getRoundIndex(event);
              const region = getRegion(event);

              if (roundIndex === -1) {
                console.log(`  SKIPPED — could not determine round`);
                continue;
              }

              if (roundIndex <= 3 && region) {
                const key = `${region}-${roundIndex}`;
                regionRoundCount[key] = (regionRoundCount[key] || 0) + 1;
                const gameNum = regionRoundCount[key];
                const gameId = buildGameId(region, roundIndex, gameNum);
                if (gameId) {
                  newResults[ROUND_KEYS[roundIndex]].push({ gameId, winner: winnerName });
                  console.log(`  → Added ${gameId}: ${winnerName}`);
                }
              } else if (roundIndex === 4) {
                const ffNum = newResults.finalfour.length + 1;
                newResults.finalfour.push({ gameId: `FF${ffNum}`, winner: winnerName });
                console.log(`  → Added FF${ffNum}: ${winnerName}`);
              } else if (roundIndex === 5) {
                newResults.championship.push({ gameId: 'CHAMP', winner: winnerName });
                console.log(`  → Added CHAMP: ${winnerName}`);
              } else {
                console.log(`  SKIPPED — roundIndex ${roundIndex} but no region`);
              }
            }

            const oldResults = JSON.stringify(bracketData.results);
            const newResultsStr = JSON.stringify(newResults);

            if (oldResults === newResultsStr) {
              console.log('\nNo changes detected, skipping Gist update.');
              return;
            }

            bracketData.results = newResults;
            await updateGist(gistId, token, bracketData);
            console.log('\nGist updated successfully!');
            console.log('New results:', JSON.stringify(newResults, null, 2));
          }

          main().catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          EOF
